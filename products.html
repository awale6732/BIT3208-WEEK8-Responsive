<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Showcase</title>
    <style>
        /* Mobile First - Base Styles */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background: #f0f0f0;
            font-size: 16px;
            padding: 10px;
        }

        /* Navigation */
        nav {
            background: #4CAF50;
            padding: 15px;
            text-align: center;
        }
        nav h1 { color: white; font-size: 20px; }

        /* Header */
        header {
            text-align: center;
            padding: 20px;
            background: white;
            margin: 10px 0;
            border-radius: 10px;
        }
        header h2 { color: #4CAF50; }

        /* Products Grid - Mobile First (1 column) */
        .products {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin: 10px 0;
        }

        .product-card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .product-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            max-width: 100%;
        }

        .product-info {
            padding: 15px;
        }

        .product-info h3 {
            color: #333;
            margin-bottom: 8px;
        }

        .product-info p {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .price {
            color: #4CAF50;
            font-size: 20px;
            font-weight: bold;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 10px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            text-align: center;
            margin-top: 10px;
            cursor: pointer;
            text-decoration: none;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 15px;
            background: #4CAF50;
            color: white;
            border-radius: 10px;
            margin-top: 10px;
        }

        /* Tablet - 768px and above (2 columns) */
        @media (min-width: 768px) {
            body { font-size: 17px; padding: 15px; }
            
            .products {
                grid-template-columns: repeat(2, 1fr);
            }

            nav h1 { font-size: 24px; }
        }

        /* Desktop - 1024px and above (4 columns) */
        @media (min-width: 1024px) {
            body { font-size: 18px; max-width: 1200px; margin: 0 auto; padding: 20px; }

            .products {
                grid-template-columns: repeat(4, 1fr);
            }
        }
    </style>
</head>
<body>

    <nav>
        <h1>My Shop - Product Showcase</h1>
    </nav>

    <header>
        <h2>Our Products</h2>
        <p>Quality products at affordable prices</p>
    </header>

    <div class="products">

        <div class="product-card">
            <img src="https://via.placeholder.com/300x200?text=Laptop" alt="Laptop">
            <div class="product-info">
                <h3>Laptop</h3>
                <p>High performance laptop suitable for students and professionals.</p>
                <span class="price">KSh 45,000</span>
                <a href="#" class="btn">Buy Now</a>
            </div>
        </div>

        <div class="product-card">
            <img src="https://via.placeholder.com/300x200?text=Smartphone" alt="Smartphone">
            <div class="product-info">
                <h3>Smartphone</h3>
                <p>Latest smartphone with amazing camera and long battery life.</p>
                <span class="price">KSh 2

<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweet Cakes - About Us</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #fff5f5; font-size: 16px; }
        nav { background: #e91e8c; padding: 15px; }
        .nav-brand { color: white; font-size: 22px; font-weight: bold; text-align: center; display: block; }
        .nav-links { display: flex; flex-direction: column; align-items: center; margin-top: 10px; gap: 8px; }
        .nav-links a { color: white; text-decoration: none; font-size: 15px; padding: 5px 10px; }
        .page-header { background: linear-gradient(135deg, #e91e8c, #ff6b9d); color: white; text-align: center; padding: 30px 20px; }
        .page-header h1 { font-size: 28px; }
        .about-content { padding: 20px 15px; }
        .about-section { background: white; padding: 20px; border-radius: 10px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .about-section h2 { color: #e91e8c; margin-bottom: 10px; }
        .about-section p { color: #666; line-height: 1.6; }
        .team { padding: 20px 15px; }
        .team h2 { text-align: center; color: #e91e8c; margin-bottom: 20px; }
        .team-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .team-card { background: white; padding: 20px; border-radius: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .team-card img { width: 100px; height: 100px; border-radius: 50%; max-width: 100%; border: 3px solid #e91e8c; margin-bottom: 10px; }
        .team-card h3 { color: #333; }
        .team-card p { color: #e91e8c; font-size: 14px; }
        footer { background: #e91e8c; color: white; text-align: center; padding: 20px; margin-top: 20px; }
        footer a { color: white; text-decoration: none; margin: 0 10px; }
        @media (min-width: 768px) {
            .nav-links { flex-direction: row; justify-content: center; gap: 20px; }
            .team-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (min-width: 1024px) {
            nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 40px; }
            .nav-brand { text-align: left; }
            .nav-links { margin-top: 0; }
            .about-content { padding: 30px 40px; }
            .team { padding: 30px 40px; }
            .team-grid { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>

            <a href="contact.html">Contact</a>
        </div>
    </nav>
